# =============================================================
# GRAPHQL MESH ’┐Į Configuration du gateway SchooInc
# =============================================================
# Ce fichier d’┐Įclare toutes les sources de donn’┐Įes que le gateway
# agr’┐Įge en un seul sch’┐Įma GraphQL unifi’┐Į.
#
# Sources :
#   1. Service_User    ? Service GraphQL local (port 4001)
#   2. Service_School  ? Service GraphQL local (port 4002)
#   3. Service_Grading ? Service GraphQL local (port 4003)
#
# Lancer le gateway :
#   npm run dev   ? mode d’┐Įveloppement avec hot-reload
#   npm start     ? mode production
#
# GraphiQL accessible sur : http://localhost:4000/graphql
# =============================================================

sources:
  # -----------------------------------------------------------
  # Source 1 : Service Users (GraphQL local port 4001)
  # -----------------------------------------------------------
  - name: User
    handler:
      graphql:
        endpoint: "{env.USER_SERVICE_URL}"
        operationHeaders:
          # Propager le header Authorization Bearer token aux services
          Authorization: "{context.headers.authorization}"
    transforms:
      - encapsulate:
          applyTo:
            query: true
            mutation: true

  # -----------------------------------------------------------
  # Source 2 : Service School (GraphQL local port 4002)
  # -----------------------------------------------------------
  - name: School
    handler:
      graphql:
        endpoint: "{env.SCHOOL_SERVICE_URL}"
        operationHeaders:
          # Propager le header Authorization Bearer token aux services
          Authorization: "{context.headers.authorization}"
    transforms:
      - encapsulate:
          applyTo:
            query: true
            mutation: true

  # -----------------------------------------------------------
  # Source 3 : Service Grading (GraphQL local port 4003)
  # -----------------------------------------------------------
  - name: Grading
    handler:
      graphql:
        endpoint: "{env.GRADING_SERVICE_URL}"
        operationHeaders:
          # Propager le header Authorization Bearer token aux services
          Authorization: "{context.headers.authorization}"
    transforms:
      - encapsulate:
          applyTo:
            query: true
            mutation: true

# -----------------------------------------------------------
# Serveur
# -----------------------------------------------------------
serve:
  hostname: 0.0.0.0
  port: 4000
